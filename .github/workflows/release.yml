name: release

# Cuts a real, user-facing release. Two ways to fire it:
#
#   • "Promote beta"  Actions ▸ release ▸ Run workflow ▸ version: v0.4.1
#                     source: promote-beta   (DEFAULT)
#       → the EXACT multi-arch image you tested as `:beta` is re-tagged to
#         `:vX.Y.Z` + `:latest` by digest. No rebuild — bit-for-bit what
#         you validated. Seconds, not minutes.
#
#   • Tagged rebuild  git tag v0.5.0 && git push origin v0.5.0
#       → a fresh, fully reproducible build from that exact commit.
#         (Also reachable via Run workflow with source: rebuild.)
#
# Either way you also get a GitHub Release with binaries for
# Linux / macOS / Windows (amd64 + arm64), the React UI baked in, and a
# SHA256SUMS file. No secrets are ever written into this file — they come
# from GitHub Actions Secrets only.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v0.4.1)"
        required: true
      source:
        description: "promote-beta = ship the tested :beta as-is | rebuild = build fresh from this ref"
        type: choice
        options: [promote-beta, rebuild]
        default: promote-beta

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/beztebya666/k8s-view
  DOCKERHUB_IMAGE: beztebya666/k8s-view

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      raw: ${{ steps.v.outputs.raw }}
      mode: ${{ steps.v.outputs.mode }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
            mode="${{ inputs.source }}"
          else
            ver="${GITHUB_REF_NAME}"
            mode="rebuild"            # a pushed tag is always a from-source release
          fi
          case "$ver" in v*) ;; *) ver="v$ver" ;; esac
          echo "version=${ver}"  >> "$GITHUB_OUTPUT"
          echo "raw=${ver#v}"    >> "$GITHUB_OUTPUT"
          echo "mode=${mode}"    >> "$GITHUB_OUTPUT"
          echo "Releasing ${ver} via ${mode}"

  # ── Path A: promote the already-built, already-tested :beta by digest ──
  promote:
    needs: prep
    if: needs.prep.outputs.mode == 'promote-beta'
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        # User-owned PAT (write:packages): the pre-existing GHCR package does
        # not auto-trust the repo GITHUB_TOKEN — see ci.yml for the rationale.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: beztebya666
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: beztebya666
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Re-tag :beta → :version, then :latest (ordered, no rebuild)
        run: |
          v="${{ needs.prep.outputs.version }}"
          src="${GHCR_IMAGE}:beta"
          # Separate ops, :version before :latest, so both land with newer
          # timestamps than the (older, untouched) :beta and :latest ends up
          # on top of the registry tag list. imagetools copies the whole
          # multi-arch manifest by digest — no rebuild.
          docker buildx imagetools create -t "${GHCR_IMAGE}:${v}" "${src}"
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            docker buildx imagetools create -t "${DOCKERHUB_IMAGE}:${v}" "${src}"
          fi
          docker buildx imagetools create -t "${GHCR_IMAGE}:latest" "${src}"
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            docker buildx imagetools create -t "${DOCKERHUB_IMAGE}:latest" "${src}"
          fi
          echo "Promoted ${src} → ${v} + latest"
          docker buildx imagetools inspect "${GHCR_IMAGE}:${v}" | head -20

  # ── Path B: deterministic rebuild from this exact commit ──
  rebuild:
    needs: prep
    if: needs.prep.outputs.mode == 'rebuild'
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        # User-owned PAT (write:packages): the pre-existing GHCR package does
        # not auto-trust the repo GITHUB_TOKEN — see ci.yml for the rationale.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: beztebya666
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: beztebya666
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute :version tags
        id: tags
        run: |
          v="${{ needs.prep.outputs.version }}"
          tags="${GHCR_IMAGE}:${v}"
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            tags="${tags},${DOCKERHUB_IMAGE}:${v}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
      - name: Build & push :version (amd64 + arm64)
        # :beta is intentionally NOT touched here. It stays its own
        # separate, older image — the last pre-release main build ci.yml
        # pushed — so the registry shows :beta as a distinct entry,
        # below the freshly built release tags.
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # No provenance/SBOM attestation manifests — they show up as
          # extra "untagged" versions in the registry for no real benefit.
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.prep.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Re-tag :version → :latest (no rebuild)
        run: |
          v="${{ needs.prep.outputs.version }}"
          docker buildx imagetools create -t "${GHCR_IMAGE}:latest" "${GHCR_IMAGE}:${v}"
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            docker buildx imagetools create -t "${DOCKERHUB_IMAGE}:latest" "${DOCKERHUB_IMAGE}:${v}"
          fi

  # Build the SPA exactly once and hand the embed-ready dist to every binary.
  frontend:
    needs: prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: internal/web/dist
          retention-days: 1
          if-no-files-found: error

  binaries:
    needs: [prep, frontend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Restore embedded UI
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: internal/web/dist
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          v="${{ needs.prep.outputs.version }}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${v#v} -X main.commit=${GITHUB_SHA::7}" \
            -o "build/k8s-view${{ matrix.ext }}" ./cmd/k8sview
      - name: Package
        run: |
          v="${{ needs.prep.outputs.version }}"
          base="k8s-view_${v}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cp README.md LICENSE build/ 2>/dev/null || cp README.md build/ 2>/dev/null || true
          cd build
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -q "${base}.zip" k8s-view${{ matrix.ext }} README.md LICENSE 2>/dev/null \
              || zip -q "${base}.zip" k8s-view${{ matrix.ext }}
          else
            tar -czf "${base}.tar.gz" k8s-view${{ matrix.ext }} README.md LICENSE 2>/dev/null \
              || tar -czf "${base}.tar.gz" k8s-view${{ matrix.ext }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/*.tar.gz
            build/*.zip
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [prep, binaries, promote, rebuild]
    # promote XOR rebuild runs; tolerate the skipped one but bail on real failure.
    if: ${{ always() && needs.binaries.result == 'success' && needs.promote.result != 'failure' && needs.rebuild.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          sha256sum k8s-view_* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Release notes
        run: |
          v="${{ needs.prep.outputs.version }}"
          {
            echo "## k8s-view ${v}"
            echo
            echo "A single-binary, real-time Kubernetes dashboard — the whole UI is"
            echo "baked into one executable. No agent, no database, no Helm required."
            echo
            echo "### Container images (multi-arch \`amd64\` + \`arm64\`)"
            echo '```'
            echo "docker pull ${GHCR_IMAGE}:${v}"
            echo "docker pull ${DOCKERHUB_IMAGE}:${v}"
            echo '```'
            echo
            echo "### Binaries"
            echo "Grab the archive for your OS/arch below, extract, and run \`./k8s-view\`."
            echo "Verify downloads against \`SHA256SUMS.txt\`."
          } > notes.md
          cat notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prep.outputs.version }}
          name: ${{ needs.prep.outputs.version }}
          body_path: notes.md
          draft: false
          prerelease: false
          files: |
            dist/k8s-view_*
            dist/SHA256SUMS.txt
