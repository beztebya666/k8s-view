# Plain `kubectl apply -f all-in-one.yaml` install. Equivalent to the Helm
# chart with default values. Convenient for "just give me the dashboard".
#
# What you get:
#   - Namespace                k8s-view
#   - ServiceAccount           k8s-view
#   - ClusterRole + binding    cluster-admin equivalent (override for prod)
#   - Deployment               1 replica, hardened pod context, /tmp + emptyDir
#   - Service                  ClusterIP :80, sticky sessions for WebSocket
#
# For HPA / PDB / NetworkPolicy / ingress / OIDC / LDAP / persistence use
# the Helm chart (deploy/helm) — this manifest is intentionally minimal.

apiVersion: v1
kind: Namespace
metadata:
  name: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/part-of: k8s-view

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-view
  namespace: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-view
subjects:
  - kind: ServiceAccount
    name: k8s-view
    namespace: k8s-view

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-view
  namespace: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view
    app.kubernetes.io/version: "0.4.1"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-view
      app.kubernetes.io/instance: k8s-view
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-view
        app.kubernetes.io/instance: k8s-view
    spec:
      serviceAccountName: k8s-view
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k8s-view
          image: ghcr.io/beztebya666/k8s-view:v0.4.1
          imagePullPolicy: IfNotPresent
          args:
            - --in-cluster
            - --listen=:8080
            - --log-level=info
            - --resync-seconds=0
            - --allow-origins=*
          ports:
            - { containerPort: 8080, name: http, protocol: TCP }
          readinessProbe:
            httpGet: { path: /api/v1/healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-view
  namespace: k8s-view
  labels:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view
spec:
  type: ClusterIP
  # ClientIP affinity keeps each browser's WebSocket on a single replica
  # so watch traffic isn't split when replicaCount > 1.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app.kubernetes.io/name: k8s-view
    app.kubernetes.io/instance: k8s-view
  ports:
    - { port: 80, targetPort: http, name: http, protocol: TCP }
