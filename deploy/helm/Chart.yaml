apiVersion: v2
name: k8s-view
description: |
  k8s-view — a streaming, multi-cluster Kubernetes dashboard.
  Single Go binary, MessagePack delta WebSocket, side-panel inline actions
  (scale / restart / rollout history & rollback / describe / exec / logs /
  port-forward), Prometheus + metrics-server charts. Production-grade
  defaults, hardened pod, no telemetry.
type: application
# Chart version is bumped on every chart change.
# appVersion tracks the binary release.
version: 0.4.1
appVersion: "v0.4.1"
kubeVersion: ">=1.20.0-0"
home: https://github.com/beztebya666/k8s-view
sources:
  - https://github.com/beztebya666/k8s-view
icon: https://raw.githubusercontent.com/beztebya666/k8s-view/main/frontend/public/favicon.svg
keywords:
  - kubernetes
  - k8s
  - dashboard
  - ui
  - web-ui
  - kubernetes-dashboard
  - kubernetes-ui
  - multi-cluster
  - rollback
  - rollout
  - prometheus
  - metrics-server
  - kubectl
  - observability
  - devops
  - cloud-native
  - self-hosted
maintainers:
  - name: beztebya666
    url: https://github.com/beztebya666
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: monitoring-logging
  artifacthub.io/changes: |
    - kind: added
      description: Force delete (--force --grace-period=0) beside every Delete — row kebab, bulk selection, and the detail-panel header
    - kind: added
      description: Node detail page metrics — CPU / Memory / Disk charts with Prometheus and metrics-server fallback
    - kind: added
      description: Topology — Pod cards now show the running container image tag; larger cards and wider columns
    - kind: added
      description: Auto-open the dashboard in the browser on startup, with a graceful fallback when the port is busy
    - kind: added
      description: Multi-arch CI/CD — rolling :beta from main, tag/dispatch releases with amd64+arm64 images and Linux/macOS/Windows binaries
    - kind: fixed
      description: WebSocket close-duration was logged as ~0 (time.Since evaluated at connect, not close)
    - kind: fixed
      description: YAML editor — Save no longer fails with SSA "duplicate entries for key" errors (full-document saves now use Update/PUT like kubectl-edit and Lens; partial-field patches keep using server-side apply). The error banner is dismissible (× button) and auto-clears after 5 s.
