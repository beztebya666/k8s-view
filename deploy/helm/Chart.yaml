apiVersion: v2
name: k8s-view
description: |
  k8s-view — a streaming, multi-cluster Kubernetes dashboard.
  Single Go binary, MessagePack delta WebSocket, side-panel inline actions
  (scale / restart / rollout history & rollback / describe / exec / logs /
  port-forward), Prometheus + metrics-server charts. Production-grade
  defaults, hardened pod, no telemetry.
type: application
# Chart version is bumped on every chart change.
# appVersion tracks the binary release.
version: 0.4.0
appVersion: "v0.4.0"
kubeVersion: ">=1.20.0-0"
home: https://github.com/beztebya666/k8s-view
sources:
  - https://github.com/beztebya666/k8s-view
icon: https://raw.githubusercontent.com/beztebya666/k8s-view/main/frontend/public/favicon.svg
keywords:
  - kubernetes
  - k8s
  - dashboard
  - ui
  - web-ui
  - kubernetes-dashboard
  - kubernetes-ui
  - multi-cluster
  - rollback
  - rollout
  - prometheus
  - metrics-server
  - kubectl
  - observability
  - devops
  - cloud-native
  - self-hosted
maintainers:
  - name: beztebya666
    url: https://github.com/beztebya666
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: monitoring-logging
  artifacthub.io/changes: |
    - kind: added
      description: Log viewer — text-wrap, pretty-JSON and logfmt toggles, severity + structured-log coloring
    - kind: added
      description: In-app back / forward navigation and a Home jump in the top bar
    - kind: added
      description: Per-cluster environment tags (PROD badge) and custom icons (image upload / emoji / hue)
    - kind: added
      description: Responsive layout — off-canvas sidebar drawer and full-screen detail panel on small screens
    - kind: added
      description: Node kubeadm actions — certificate renewal and version upgrade (control-plane-only, hard-guarded)
    - kind: added
      description: Group picker, CRD spec YAML, CRD row actions, and Secret type quick-filters
    - kind: fixed
      description: node-shell waits for the container to be Running before exec; row kebab no longer closes on live refresh
