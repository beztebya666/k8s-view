{{- if .Values.rbac.create -}}
{{- if eq .Values.rbac.scope "Cluster" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-view.fullname" . }}
  labels: {{- include "k8s-view.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.rbac.rules | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-view.fullname" . }}
  labels: {{- include "k8s-view.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-view.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-view.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
# Namespace-scoped install — Role+RoleBinding inside .Release.Namespace.
# Cluster-scoped resources (Nodes, PVs, CRDs) won't appear in the UI.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-view.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-view.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.rbac.rules | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-view.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-view.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-view.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-view.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
